# Add this server block to your existing Nginx configuration.
# It proxies reelnight_frontend for the UI and reelnight_pb for the API.
# Adjust the server_name to your domain or local hostname.

server {
    listen 80;
    server_name reelnight.yourdomain.com;   # ← change to your domain or local hostname

    # Frontend — served by the static nginx:alpine container
    location / {
        proxy_pass         http://reelnight_frontend:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # PocketBase REST API — used by the frontend JS
    location /api/ {
        proxy_pass         http://reelnight_pb:8090/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        # Required for PocketBase realtime (SSE)
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
    }

    # PocketBase admin UI — accessible at /pb-admin/
    # Restrict this to your IP in production!
    location /pb-admin/ {
        proxy_pass         http://reelnight_pb:8090/_/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
