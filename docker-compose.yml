services:
  reelnight_pb:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: reelnight_pb
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - /mnt/share3/docker/appdata/reelknight_pb:/pb_data
      - /mnt/share3/docker/appdata/reelknight_pb/migrations:/pb_migrations
      - /mnt/share3/docker/appdata/reelknight_pb/pb_hooks:/pb_hooks
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - proxy

  reelnight_frontend:
    build: .
    container_name: reelnight_frontend
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      reelnight_pb:
        condition: service_healthy

networks:
  proxy:
    external: true
    name: nginx-proxy-manager_default   # ← change this to your existing network name
