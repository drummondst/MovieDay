services:
  reelnight_pb:
    build: .
    container_name: reelnight_pb
    restart: unless-stopped
    volumes:
      - /mnt/share3/docker/appdata/reelknight_pb:/pb/pb_data
    # healthcheck:
    #   test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    networks:
      - proxy

  reelnight_frontend:
    build: .
    container_name: reelnight_frontend
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      reelnight_pb:
        condition: service_healthy

networks:
  proxy:
    external: true
    name: nginx-proxy-manager_default   # ← change this to your existing network name
